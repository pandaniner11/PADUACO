<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>1 Percent Consulting — Federal Retirement Clarity</title>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:       #1B2A6B;
            --text-gray:  #5A6070;
            --accent-gray:#4B5563;
            --white:      #FFFFFF;
            --light-bg:   #F7F8FB;
            --gold:       #C9A84C;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--white);
            color: var(--navy);
            line-height: 1.6;
        }

        /* ------ NAVBAR ------ */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 64px;
        }

        .nav-logo {
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
            text-decoration: none;
            color: var(--white);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .nav-logo .num {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .nav-cta {
            padding: 0.55rem 1.4rem;
            border: 1.5px solid var(--white);
            color: var(--white);
            text-decoration: none;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.2s;
            background: transparent;
            font-family: inherit;
            cursor: pointer;
        }

        .nav-cta:hover { background: var(--white); color: var(--navy); }

        /* ------ TICKER ------ */
        .ticker-wrap {
            background: var(--light-bg);
            border-bottom: 1px solid #e2e5ef;
            overflow: hidden;
            white-space: nowrap;
            padding: 0.55rem 0;
        }

        .ticker-inner {
            display: inline-flex;
            gap: 3rem;
            animation: ticker 28s linear infinite;
        }

        .ticker-item {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-gray);
        }
